name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  ASPIRE_CONTAINER_RUNTIME: docker

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ContentLocalizationSaaS.slnx
        working-directory: api

      - name: Build
        run: dotnet build ContentLocalizationSaaS.slnx --configuration Release --no-restore --nologo
        working-directory: api

      # Integration tests are excluded in CI for now due container-runtime requirements.
      - name: Run unit tests
        run: |
          dotnet test ContentLocalizationSaaS.Application.Tests/ContentLocalizationSaaS.Application.Tests.csproj --configuration Release --no-build --nologo
          dotnet test ContentLocalizationSaaS.Domain.Tests/ContentLocalizationSaaS.Domain.Tests.csproj --configuration Release --no-build --nologo
        working-directory: api

      - name: Optional backend lint (dotnet format)
        run: dotnet format ContentLocalizationSaaS.slnx --verify-no-changes --no-restore
        working-directory: api

  integration:
    name: Integration tests (Aspire)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Container runtime health
        shell: bash
        run: |
          set -euo pipefail
          docker version
          docker info

      - name: Restore
        run: dotnet restore ContentLocalizationSaaS.slnx
        working-directory: api

      - name: Run integration tests
        shell: bash
        run: |
          set -euo pipefail
          dotnet test ContentLocalizationSaaS.Api.IntegrationTests/ContentLocalizationSaaS.Api.IntegrationTests.csproj \
            --configuration Release \
            --nologo \
            --logger "trx;LogFileName=integration-tests.trx" \
            2>&1 | tee integration-tests.log
        working-directory: api

      - name: Upload integration diagnostics (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-diagnostics
          path: |
            api/integration-tests.log
            api/**/integration-tests.trx
          if-no-files-found: ignore

  frontend:
    name: Frontend lint + e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run lint (if script exists)
        shell: bash
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script found; skipping frontend lint step."
          fi
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
