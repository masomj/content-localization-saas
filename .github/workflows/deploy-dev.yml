name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.HETZNER_DEV_HOST }}
  SERVER_USER: root
  DEPLOY_PATH: /opt/locflow
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/locflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}-api:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,init-databases.sql,keycloak/"
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE_PREFIX,REGISTRY
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set image tag
            export IMAGE_TAG=${{ steps.vars.outputs.sha_short }}

            # Pull new images
            docker compose -f docker-compose.prod.yml pull api frontend

            # Run database migrations BEFORE swapping containers
            echo "=== Running EF Core migrations ==="
            docker compose -f docker-compose.prod.yml run --rm \
              -e ASPNETCORE_ENVIRONMENT=Production \
              --entrypoint "" \
              api \
              dotnet ContentLocalizationSaaS.Api.dll --migrate-only

            # Deploy with zero-downtime rolling update
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Health check
            echo "=== Waiting for health check ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:5135/healthz > /dev/null 2>&1; then
                echo "API healthy after ${i}s"
                break
              fi
              sleep 1
            done

            # Clean up old images
            docker image prune -f

            echo "=== Deployed ${{ steps.vars.outputs.sha_short }} at $(date) ==="
