name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.HETZNER_DEV_HOST }}
  SERVER_USER: root
  DEPLOY_PATH: /opt/intercopy

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Copy source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "api/,frontend/,keycloak/,scripts/,docker-compose.yml,docker-compose.prod.yml,Caddyfile,init-databases.sql"
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Build and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/intercopy

            echo "=== Building images ==="
            docker compose build --no-cache api frontend

            echo "=== Running EF Core migrations ==="
            docker compose run --rm \
              -e ASPNETCORE_ENVIRONMENT=Development \
              --entrypoint "" \
              api \
              dotnet ContentLocalizationSaaS.Api.dll --migrate-only || echo "Migration step skipped (may need DB running first)"

            echo "=== Deploying containers ==="
            docker compose up -d --remove-orphans

            echo "=== Waiting for API health check ==="
            for i in $(seq 1 60); do
              if curl -sf http://localhost:5135/healthz > /dev/null 2>&1; then
                echo "API healthy after ${i}s"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "WARNING: API not healthy after 60s"
              fi
              sleep 1
            done

            docker image prune -f
            echo "=== Deployed ${{ steps.vars.outputs.sha_short }} at $(date) ==="

      - name: Patch Keycloak client config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 5m
          script: |
            chmod +x /opt/intercopy/scripts/keycloak-patch-client.sh
            bash /opt/intercopy/scripts/keycloak-patch-client.sh
